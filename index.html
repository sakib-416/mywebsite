<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakib AI - শাকিব ভাইয়ের চেলা</title>

    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-light: #f1f5f9;
        }

        body {
            margin: 0;
            font-family: 'Hind Siliguri', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            color: var(--text-light);
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 15px;
            animation: fadeInDown 0.8s ease;
        }

        .header img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
            transition: transform 0.3s;
        }

        .header img:hover { transform: scale(1.1) rotate(5deg); }

        .header h1 {
            margin: 8px 0 0;
            font-size: 22px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .chat-container {
            width: 95%;
            max-width: 550px;
            height: 70vh;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .message {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 85%;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
            animation: slideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .user {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            align-self: flex-end;
            color: #000;
            border-bottom-right-radius: 4px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(56, 189, 248, 0.2);
        }

        .bot {
            background: #334155;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .loading-dots {
            font-style: italic;
            opacity: 0.7;
            font-size: 13px;
            margin-top: 5px;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: rgba(15, 23, 42, 0.9);
            gap: 10px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid #475569;
            border-radius: 30px;
            outline: none;
            background: #1e293b;
            color: white;
            transition: all 0.3s;
        }

        input:focus { 
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        button {
            padding: 0 25px;
            border-radius: 30px;
            border: none;
            background: var(--accent);
            color: #000;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #7dd3fc;
            transform: translateY(-2px);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-25px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="header">
    <img src="Screenshot 2026-02-24 213856.png" alt="Shakib">
    <h1>শাকিব ভাইয়ের চেলা 😎</h1>
</div>

<div class="chat-container">
    <div class="messages" id="messages">
        <div class="message bot">কিরে পিচ্চি, আইসা পড়লি? ক কী জিগাবি? (Gemma-3-27b এখন রেডি!)</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="কিছু একটা লেখ তো বেটা...">
        <button onclick="sendMessage()">পাঠাও</button>
    </div>
</div>

<script>
// নতুন API Key এবং Gemma-3 মডেল সেট করা হয়েছে
const API_KEY = "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";
const MODEL_NAME = "google/gemma-3-27b-it:free";

let chatHistory = [
    {
        role: "system",
        content: "তোমার নাম 'শাকিব ভাইয়ের চেলা'। তুমি শাকিব নামের একজনের অ্যাসিস্ট্যান্ট বা বন্ধু। তুমি খুব মজার, একটু অসভ্য কিন্তু বন্ধুসুলভ টোনে কথা বলো। মানুষকে তুমি 'হালা', 'বেটা', 'পিচ্চি', 'ভাগ্নী' এসব বলে সম্বোধন করো। সবসময় বাংলায় উত্তর দিবে।"
    }
];

document.getElementById("userInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});

async function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    chatHistory.push({ role: "user", content: message });
    input.value = "";

    const loadingMsg = addMessage("দাঁড়া, মাথা খাটাইতাছি...", "bot loading-dots");

    try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${API_KEY}`,
                "Content-Type": "application/json",
                "HTTP-Referer": window.location.origin,
                "X-Title": "Shakib AI v2"
            },
            body: JSON.stringify({
                model: MODEL_NAME,
                messages: chatHistory,
                temperature: 0.8
            })
        });

        const data = await response.json();
        loadingMsg.remove();

        if (data.choices && data.choices.length > 0) {
            const botReply = data.choices[0].message.content;
            addMessage(botReply, "bot");
            chatHistory.push({ role: "assistant", content: botReply });
        } else {
            addMessage("হালা, তোর API এ কাজ করতেছে না! এরর আসছে।", "bot");
            console.log(data);
        }

    } catch (error) {
        loadingMsg.innerText = "আরে ধুর! নেট চলে গেছে মনে হয়।";
        console.error(error);
    }
}

function addMessage(text, className) {
    const msgDiv = document.createElement("div");
    msgDiv.className = `message ${className}`;
    msgDiv.innerText = text;
    const container = document.getElementById("messages");
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
    return msgDiv;
}
</script>

</body>
</html>
