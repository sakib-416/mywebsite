<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shakib AI</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
}

.header {
    text-align: center;
    color: white;
    margin-top: 15px;
}

.header img {
    width: 85px;
    height: 85px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #38bdf8;
}

.header h1 {
    margin: 8px;
    font-size: 22px;
}

.chat-container {
    width: 95%;
    max-width: 600px;
    height: 75vh;
    background: #1e293b;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.message {
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 15px;
    max-width: 75%;
    animation: fadeIn 0.3s ease;
}

.user {
    background: #38bdf8;
    align-self: flex-end;
    color: black;
}

.bot {
    background: #334155;
    color: white;
    align-self: flex-start;
}

.loading {
    font-style: italic;
    opacity: 0.7;
}

.input-area {
    display: flex;
    border-top: 1px solid #475569;
    background: #0f172a;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
    font-size: 14px;
    background: transparent;
    color: white;
}

button {
    padding: 12px 20px;
    border: none;
    background: #38bdf8;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #0ea5e9;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(5px);}
    to {opacity:1; transform: translateY(0);}
}

@media(max-width:600px){
    .chat-container{
        height:80vh;
    }
}
</style>
</head>

<body>

<div class="header">
    <img src="Screenshot 2026-02-24 213856.png" alt="Shakib">
    <h1>শাকিব ভাইয়ের চেলা</h1>
</div>

<div class="chat-container">
    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="কিছু জিজ্ঞেস করো...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const API_KEY = "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";

let chatHistory = [
    {
        role: "system",
        content: "তুমি সব সময় বাংলায় কথা বলবে। সহজ ভাষায় বুঝাবে। মজার এবং বন্ধুসুলভ টোনে কথা বলবে। কিছু শেখানোর সময় সুন্দর করে গুছিয়ে বুঝাবে। তোমার টোন হবে এমন: এই হালা এটা বুঝোস না?"
    }
];

document.getElementById("userInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

async function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    chatHistory.push({ role: "user", content: message });
    input.value = "";

    const loadingMsg = addMessage("টাইপ করতেছে...", "bot", true);

    try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + API_KEY,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "qwen/qwen3-next-80b-a3b-instruct:free",
                messages: chatHistory
            })
        });

        const data = await response.json();

        if (!data.choices) {
            loadingMsg.innerText = "API Error! Key check করো!";
            return;
        }

        const botReply = data.choices[0].message.content;

        loadingMsg.remove();
        addMessage(botReply, "bot");

        chatHistory.push({ role: "assistant", content: botReply });

    } catch (error) {
        loadingMsg.innerText = "কিছু সমস্যা হইছে ভাই!";
    }
}

function addMessage(text, sender, isLoading = false) {
    const msgDiv = document.createElement("div");
    msgDiv.classList.add("message", sender);
    if (isLoading) msgDiv.classList.add("loading");
    msgDiv.innerText = text;
    document.getElementById("messages").appendChild(msgDiv);
    msgDiv.scrollIntoView();
    return msgDiv;
}
</script>

</body>
</html>
