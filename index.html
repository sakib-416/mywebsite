<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shakib AI - শাকিব ভাইয়ের চেলা</title>

    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-light: #f1f5f9;
        }

        body {
            margin: 0;
            font-family: 'Hind Siliguri', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            color: var(--text-light);
        }

        .header {
            text-align: center;
            padding: 20px;
            animation: fadeInDown 0.8s ease;
        }

        .header img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            transition: transform 0.3s;
        }

        .header img:hover { transform: scale(1.05); }

        .header h1 {
            margin: 10px 0 0;
            font-size: 24px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .chat-container {
            width: 90%;
            max-width: 500px;
            height: 65vh;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .message {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: slideIn 0.3s ease-out;
        }

        .user {
            background: var(--accent);
            align-self: flex-end;
            color: #000;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .bot {
            background: #334155;
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .loading {
            font-style: italic;
            opacity: 0.6;
            font-size: 13px;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: rgba(15, 23, 42, 0.8);
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #475569;
            border-radius: 25px;
            outline: none;
            background: #1e293b;
            color: white;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--accent); }

        button {
            padding: 0 20px;
            border-radius: 25px;
            border: none;
            background: var(--accent);
            color: #000;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #0ea5e9;
            transform: scale(1.05);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="header">
    <img src="Screenshot 2026-02-24 213856.png" alt="Shakib">
    <h1>শাকিব ভাইয়ের চেলা 😎</h1>
</div>

<div class="chat-container">
    <div class="messages" id="messages">
        <div class="message bot">কি রে পিচ্চি! কিছু জিগাবি? নাকি খালি হা করিয়া তাকায়া থাকবি?</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="মন খুলে কিছু বল...">
        <button onclick="sendMessage()">পাঠাও</button>
    </div>
</div>

<script>
// আপনার API KEY ঠিক আছে, তবে মডেল নামটি আপডেট করা হয়েছে।
const API_KEY = "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";

let chatHistory = [
    {
        role: "system",
        content: "তোমার নাম 'শাকিব ভাইয়ের চেলা'। তুমি খুব মজার এবং একটু রাগী রাগী ভাব দেখাও এমন বন্ধু। তুমি সব উত্তর বাংলায় দিবে। তোমার কথাবার্তায় 'হালা', 'বেটা', 'পিচ্চি' এই ধরণের মজার শব্দ ব্যবহার করবে। একদম খাঁটি দেশি বন্ধুদের মতো কথা বলবে।"
    }
];

document.getElementById("userInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});

async function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    chatHistory.push({ role: "user", content: message });
    input.value = "";

    const loadingMsg = addMessage("দাঁড়া, ভাবতেছি...", "bot loading");

    try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${API_KEY}`,
                "Content-Type": "application/json",
                "HTTP-Referer": window.location.href, // OpenRouter এর জন্য প্রয়োজন হতে পারে
                "X-Title": "Shakib AI"
            },
            body: JSON.stringify({
                model: "google/gemini-2.0-flash-lite-preview-02-05:free", // সচল ফ্রি মডেল
                messages: chatHistory
            })
        });

        const data = await response.json();
        loadingMsg.remove();

        if (data.error) {
            addMessage("হালা, তোর API Key তে ঝামেলা আছে! এরর: " + data.error.message, "bot");
            console.error(data.error);
            return;
        }

        const botReply = data.choices[0].message.content;
        addMessage(botReply, "bot");
        chatHistory.push({ role: "assistant", content: botReply });

    } catch (error) {
        loadingMsg.innerText = "নেটওয়ার্ক ফালতু! আবার ট্রাই কর।";
        console.error(error);
    }
}

function addMessage(text, sender) {
    const msgDiv = document.createElement("div");
    msgDiv.className = `message ${sender}`;
    msgDiv.innerText = text;
    const container = document.getElementById("messages");
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
    return msgDiv;
}
</script>

</body>
</html>
