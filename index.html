<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shakib AI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
}

.header {
    text-align: center;
    color: white;
    margin-bottom: 10px;
}

.header h1 {
    margin: 5px;
    font-size: 24px;
}

.header img {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #38bdf8;
}

.chat-container {
    width: 95%;
    max-width: 500px;
    height: 75vh;
    background: #1e293b;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.message {
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 80%;
}

.user {
    background: #38bdf8;
    align-self: flex-end;
}

.bot {
    background: #334155;
    color: white;
    align-self: flex-start;
}

.input-area {
    display: flex;
    border-top: 1px solid #475569;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
    font-size: 14px;
}

button {
    padding: 10px 15px;
    border: none;
    background: #38bdf8;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #0ea5e9;
}

@media(max-width: 600px){
    .chat-container {
        height: 80vh;
    }
}
</style>
</head>

<body>

<div class="header">
    <img src="ef734996-8cd1-4eb2-b8a8-6d371d6626cd.png" alt="Shakib">
    <h1>শাকিব ভাইয়ের চেলা</h1>
</div>

<div class="chat-container">
    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="কিছু জিজ্ঞেস করো...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const API_KEY = "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";

async function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + API_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            model: "qwen/qwen3-next-80b-a3b-instruct:free",
            messages: [
                {
                    role: "system",
                    content: "তুমি সব সময় বাংলায় কথা বলবে। সহজ ভাষায় বুঝাবে। মজার এবং বন্ধুসুলভ টোনে কথা বলবে। কিছু শেখানোর সময় সুন্দর করে গুছিয়ে বুঝাবে। তোমার টোন হবে এমন: এই হালা এটা বুঝোস না?"
                },
                {
                    role: "user",
                    content: message
                }
            ]
        })
    });

    const data = await response.json();
    const botReply = data.choices[0].message.content;

    addMessage(botReply, "bot");
}

function addMessage(text, sender) {
    const msgDiv = document.createElement("div");
    msgDiv.classList.add("message", sender);
    msgDiv.innerText = text;
    document.getElementById("messages").appendChild(msgDiv);
    msgDiv.scrollIntoView();
}
</script>

</body>
</html>
